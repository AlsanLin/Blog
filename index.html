<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>L3's Blog - Senior Android & Flutter Engineer | 14+ Years</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Liangliang Lin (L3) - Senior Android & Flutter Engineer with 14+ years of experience. iFlytek. Kotlin, Jetpack Compose, Flutter, HarmonyOS. Open to remote opportunities.">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">

    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">

<body>
    <div id="app">Loading...</div>
    <script>
        window.$docsify = {
            name: "L3's Blog",
            repo: 'https://github.com/alsanlin/Blog',
            loadSidebar: true,
            loadNavbar: true,
            coverpage: true,
            maxLevel: 3,
            subMaxLevel: 0,
            mergeNavbar: true,
            search: {
                maxAge: 86400000,
                paths: 'auto',
                placeholder: 'Search...',
                noData: 'No results found',
                depth: 4,
                hideOtherSidebarContent: false,
                namespace: "L3's Blog",
            }
        }
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
